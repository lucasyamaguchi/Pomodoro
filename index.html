<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pomodoro Acessível - Temas Culinários</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Quicksand:wght@600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="theme-tomato">
    <div class="lang-selector-container">
      <select id="lang-select" onchange="changeLanguage(this.value)">
        <option value="pt">🇧🇷 PT</option>
        <option value="en">🇺🇸 EN</option>
        <option value="es">🇪🇸 ES</option>
      </select>
    </div>

    <div class="floating-actions">
      <div class="action-item">
        <span class="action-label" data-i18n="lblPortfolio">Portfólio</span>
        <a
          href="#"
          target="_blank"
          rel="noopener noreferrer"
          class="action-icon-btn"
          >🌐</a
        >
      </div>
      <div class="action-item">
        <span class="action-label">GitHub</span>
        <a
          href="https://github.com/lucasyamaguchi"
          target="_blank"
          rel="noopener noreferrer"
          class="action-icon-btn"
          >🐙</a
        >
      </div>
      <div class="action-item">
        <span class="action-label" data-i18n="lblCoffee">Buy me a coffee</span>
        <a
          href="https://www.paypal.com/donate/?hosted_button_id=8T8APU4MLGTFY"
          target="_blank"
          rel="noopener noreferrer"
          class="action-icon-btn"
          >☕</a
        >
      </div>
      <div class="action-item">
        <span class="action-label" data-i18n="lblEmail">E-mail</span>
        <button
          onclick="toggleModal(true)"
          class="action-icon-btn"
          style="border-width: 3px"
        >
          ✉️
        </button>
      </div>
    </div>

    <div id="contact-modal" class="modal-overlay hidden">
      <div class="modal-content">
        <h2 data-i18n="modalTitle">Contato</h2>
        <form
          id="contact-form"
          action="https://formspree.io/f/SEU_LINK_AQUI"
          method="POST"
        >
          <div class="form-group">
            <label for="contact-contact" data-i18n="modalEmail"
              >Seu E-mail ou Telefone</label
            >
            <input type="text" id="contact-contact" name="contact" required />
          </div>
          <div class="form-group">
            <label for="contact-message" data-i18n="modalMsg"
              >Sua Mensagem</label
            >
            <textarea
              id="contact-message"
              name="message"
              rows="4"
              required
            ></textarea>
          </div>
          <div class="modal-buttons">
            <button
              type="button"
              onclick="toggleModal(false)"
              data-i18n="modalCancel"
              style="border-color: #e56b6f; color: #e56b6f"
            >
              Cancelar
            </button>
            <button type="submit" data-i18n="modalSend">Enviar</button>
          </div>
        </form>
      </div>
    </div>

    <div id="page-notification" class="notification hidden">
      Ciclo Finalizado!
    </div>

    <div class="app-layout">
      <div class="theme-column panel">
        <h3 data-i18n="titleThemes">Temas</h3>
        <div class="theme-item">
          <button
            class="theme-btn active"
            style="background: #fbc4ab"
            onclick="setTheme('theme-tomato', this)"
          ></button
          ><span class="theme-label" data-i18n="themeTomato">Tomate</span>
        </div>
        <div class="theme-item">
          <button
            class="theme-btn"
            style="background: #fdf2b3"
            onclick="setTheme('theme-saffron', this)"
          ></button
          ><span class="theme-label" data-i18n="themeSaffron">Açafrão</span>
        </div>
        <div class="theme-item">
          <button
            class="theme-btn"
            style="background: #c8e6c9"
            onclick="setTheme('theme-oregano', this)"
          ></button
          ><span class="theme-label" data-i18n="themeOregano">Orégano</span>
        </div>
        <div class="theme-item">
          <button
            class="theme-btn"
            style="background: #d8d4ec"
            onclick="setTheme('theme-blueberry', this)"
          ></button
          ><span class="theme-label" data-i18n="themeBlueberry">Mirtilo</span>
        </div>
        <div class="theme-item">
          <button
            class="theme-btn"
            style="background: #e0e0e0"
            onclick="setTheme('theme-herbs', this)"
          ></button
          ><span class="theme-label" data-i18n="themeHerbs">Ervas Secas</span>
        </div>
        <div class="theme-item">
          <button
            class="theme-btn"
            style="background: #2c2c2c"
            onclick="setTheme('theme-pepper', this)"
          ></button
          ><span class="theme-label" data-i18n="themePepper"
            >Pimenta<br />do Reino</span
          >
        </div>
      </div>

      <div class="main-column">
        <div class="panel">
          <h1>Pomodoro</h1>
          <div id="status">Pronto para Focar</div>
          <div id="timer">25:00</div>
          <div class="adjust-time">
            <button onclick="adjustTime(-1)">- 1'</button>
            <button onclick="adjustTime(1)">+ 1'</button>
          </div>
          <div class="controls">
            <button id="btn-start" onclick="startTimer()">▶️</button>
            <button id="btn-pause" onclick="pauseTimer()" disabled>⏸️</button>
            <button id="btn-reset" onclick="resetTimer()">⏹️</button>
          </div>
          <div
            class="controls"
            style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px"
          >
            <button
              class="btn-finish"
              id="btn-finish"
              onclick="handlePhaseComplete()"
              disabled
              data-i18n="btnFinish"
            >
              Concluir Ciclo
            </button>
            <button class="btn-pip" onclick="togglePiP()" data-i18n="btnPip">
              📌 Janela Flutuante
            </button>
          </div>
        </div>

        <div class="panel">
          <h2 data-i18n="titleSettings">Ajustes de Tempo</h2>
          <div class="settings-container">
            <div class="setting-item">
              <label for="set-focus"
                ><span data-i18n="lblFocus">Foco:</span>
                <span id="val-focus" class="val-display">25</span>
                <span data-i18n="min">min</span></label
              >
              <input
                type="range"
                id="set-focus"
                value="25"
                min="1"
                max="60"
                step="1"
                oninput="updateSettings('focus')"
              />
            </div>
            <div class="setting-item">
              <label for="set-short"
                ><span data-i18n="lblShort">Pausa Curta:</span>
                <span id="val-short" class="val-display">5</span>
                <span data-i18n="min">min</span></label
              >
              <input
                type="range"
                id="set-short"
                value="5"
                min="1"
                max="15"
                step="1"
                oninput="updateSettings('short')"
              />
            </div>
            <div class="setting-item">
              <label for="set-long"
                ><span data-i18n="lblLong">Pausa Longa:</span>
                <span id="val-long" class="val-display">15</span>
                <span data-i18n="min">min</span></label
              >
              <input
                type="range"
                id="set-long"
                value="15"
                min="10"
                max="45"
                step="5"
                oninput="updateSettings('long')"
              />
            </div>
            <div class="setting-item">
              <label for="set-cycles"
                ><span data-i18n="lblCycles">Ciclos p/ Pausa Longa:</span>
                <span id="val-cycles" class="val-display">4</span></label
              >
              <input
                type="range"
                id="set-cycles"
                value="4"
                min="1"
                max="10"
                step="1"
                oninput="updateSettings('cycles')"
              />
            </div>
          </div>
        </div>
      </div>

      <div class="history-column">
        <h3 data-i18n="titleHistory">Histórico</h3>
        <ul id="history"></ul>
      </div>
    </div>
  </body>
</html>
